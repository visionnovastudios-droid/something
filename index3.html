<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Janvi ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
background:radial-gradient(circle at bottom,#0d1b2a,#000814 80%);
overflow:hidden;
color:white;
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* envelope */

.envelope{
width:260px;
height:180px;
background:#ff4d6d;
position:relative;
border-radius:12px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:bold;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff2e63;
clip-path:polygon(0 0,100% 0,50% 65%);
transition:0.6s;
}

/* message card */

.container{
display:none;
background:rgba(255,255,255,0.95);
color:#333;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
max-width:360px;
text-align:center;
}

h1{
color:#ff4d6d;
}

p{
font-size:18px;
min-height:90px;
}

/* buttons */

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#666;
color:white;
position:relative;
}

/* floating hearts */

.heart{
position:absolute;
font-size:20px;
}

</style>

</head>

<body>

<div class="envelope" id="envelope">Open Message 💌</div>

<div class="container" id="content">

<h1>Hi Janvi ❤️</h1>

<p id="message"></p>

<h2>Do you like me?</h2>

<button id="yes">Yes 😊</button> <button id="no">No 😅</button>

</div>

<script>

/* create night sky stars */

for(let i=0;i<120;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
star.style.animationDelay=Math.random()*2+"s";
document.body.appendChild(star);
}

/* envelope open */

const envelope=document.getElementById("envelope");
const content=document.getElementById("content");

envelope.onclick=()=>{
envelope.style.display="none";
content.style.display="block";
typeMessage();
};

/* typing message */

const text="I don't know when exactly it started, but talking to you slowly became the best part of my day. You make everything feel lighter, happier, and a little more special.";

let i=0;

function typeMessage(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typeMessage,40);
}
}

/* NO button runs away */

const noBtn=document.getElementById("no");

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("touchstart",moveButton);

function moveButton(){

const x=Math.random()*(window.innerWidth-100);
const y=Math.random()*(window.innerHeight-50);

noBtn.style.position="absolute";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

}

/* YES heart explosion */

document.getElementById("yes").onclick=()=>{

for(let i=0;i<80;i++){

let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";
heart.style.left="50%";
heart.style.top="50%";
heart.style.position="absolute";
heart.style.fontSize=(Math.random()*25+15)+"px";

let x=(Math.random()-0.5)*800;
let y=(Math.random()-0.5)*800;

heart.style.transition="all 1s ease-out";

document.body.appendChild(heart);

setTimeout(()=>{
heart.style.transform=`translate(${x}px,${y}px)`;
heart.style.opacity="0";
},10);

setTimeout(()=>{
heart.remove();
},1000);

}

/* final screen */

setTimeout(()=>{

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:radial-gradient(circle at bottom,#0d1b2a,#000814 80%);
color:white;
font-family:sans-serif;
text-align:center;
animation:fade 2s;
">

<h1 style="
font-size:55px;
letter-spacing:3px;
color:#ff4d6d;
text-shadow:0 0 20px #ff4d6d;
">
Janvi ❤️ Neel
</h1>

<p style="font-size:22px;margin-top:10px;">
You just made Neel very happy
</p>

</div>

<style>
@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>

`;

},1200);

};

</script>

</body>
</html>
